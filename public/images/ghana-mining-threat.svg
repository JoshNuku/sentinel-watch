<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="excavatorBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#6b5333;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="800" fill="#87ceeb" opacity="0.3"/>
  
  <!-- Disturbed ground/mining pit -->
  <path d="M 0,400 Q 300,450 600,420 T 1200,440 L 1200,800 L 0,800 Z" fill="url(#groundGradient)"/>
  
  <!-- Muddy water pool -->
  <ellipse cx="400" cy="600" rx="280" ry="120" fill="url(#waterGradient)"/>
  
  <!-- Mining excavator -->
  <g id="excavator" transform="translate(700, 450)">
    <!-- Track base -->
    <rect x="-60" y="80" width="120" height="30" fill="#333" rx="5"/>
    <rect x="-55" y="85" width="110" height="20" fill="#555" rx="3"/>
    
    <!-- Body cabin -->
    <rect x="-50" y="20" width="100" height="60" fill="url(#excavatorBody)" rx="5"/>
    <rect x="-40" y="30" width="30" height="30" fill="#4a4a4a" opacity="0.6" rx="2"/>
    
    <!-- Boom arm -->
    <rect x="40" y="35" width="120" height="15" fill="url(#excavatorBody)" rx="3" transform="rotate(-30 40 42)"/>
    
    <!-- Stick arm -->
    <rect x="135" y="0" width="90" height="12" fill="url(#excavatorBody)" rx="3" transform="rotate(-60 135 6)"/>
    
    <!-- Bucket -->
    <path d="M 180,-50 L 210,-60 L 215,-40 L 190,-35 Z" fill="#555" transform="rotate(-45 200 -45)"/>
    
    <!-- Counterweight -->
    <rect x="-70" y="30" width="25" height="40" fill="#333" rx="3"/>
  </g>
  
  <!-- Deforested stumps -->
  <g opacity="0.7">
    <ellipse cx="200" cy="500" rx="25" ry="15" fill="#654321"/>
    <rect x="190" y="490" width="20" height="10" fill="#8b4513"/>
    
    <ellipse cx="950" cy="520" rx="30" ry="18" fill="#654321"/>
    <rect x="937" y="508" width="26" height="12" fill="#8b4513"/>
    
    <ellipse cx="500" cy="480" rx="20" ry="12" fill="#654321"/>
    <rect x="492" y="472" width="16" height="8" fill="#8b4513"/>
  </g>
  
  <!-- Tire tracks -->
  <g stroke="#654321" stroke-width="4" fill="none" opacity="0.4">
    <path d="M 100,550 Q 300,530 500,560 T 900,540"/>
    <path d="M 100,570 Q 300,550 500,580 T 900,560"/>
  </g>
  
  <!-- Disturbed earth piles -->
  <ellipse cx="1000" cy="650" rx="120" ry="60" fill="#8b4513" opacity="0.8"/>
  <ellipse cx="250" cy="680" rx="100" ry="50" fill="#8b4513" opacity="0.8"/>
  
  <!-- Warning atmosphere -->
  <rect width="1200" height="800" fill="#ff4500" opacity="0.05"/>
</svg>
