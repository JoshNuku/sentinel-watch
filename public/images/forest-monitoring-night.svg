<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1e2e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="treeNight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051208;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Night sky -->
  <rect width="1200" height="800" fill="url(#skyGradient2)"/>
  
  <!-- Moon -->
  <circle cx="950" cy="150" r="60" fill="#e8e8e8" opacity="0.9"/>
  <circle cx="970" cy="140" r="55" fill="url(#skyGradient2)" opacity="0.3"/>
  <circle cx="950" cy="150" r="200" fill="url(#moonGlow)"/>
  
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="200" cy="100" r="2"/>
    <circle cx="350" cy="150" r="1.5"/>
    <circle cx="500" cy="80" r="2"/>
    <circle cx="650" cy="120" r="1"/>
    <circle cx="800" cy="90" r="1.5"/>
    <circle cx="300" cy="200" r="1"/>
    <circle cx="450" cy="50" r="1.5"/>
    <circle cx="750" cy="180" r="2"/>
    <circle cx="1000" cy="250" r="1"/>
    <circle cx="150" cy="180" r="1.5"/>
  </g>
  
  <!-- Distant mountain/forest silhouette -->
  <path d="M 0,400 L 200,350 L 300,370 L 450,320 L 600,360 L 750,340 L 900,380 L 1050,350 L 1200,390 L 1200,800 L 0,800 Z" 
        fill="#051208" opacity="0.8"/>
  
  <!-- Mid-distance tree line -->
  <path d="M 0,450 Q 300,420 600,450 T 1200,450 L 1200,800 L 0,800 Z" fill="#0a1f14" opacity="0.9"/>
  
  <!-- Foreground trees with moonlight highlights -->
  <g fill="url(#treeNight)">
    <!-- Left tree -->
    <ellipse cx="180" cy="550" rx="90" ry="130"/>
    <rect x="168" y="550" width="24" height="180" rx="6"/>
    <ellipse cx="160" cy="590" rx="70" ry="100"/>
    <ellipse cx="200" cy="620" rx="60" ry="90"/>
    
    <!-- Center left tree -->
    <ellipse cx="500" cy="520" rx="100" ry="150"/>
    <rect x="486" y="520" width="28" height="200" rx="7"/>
    <ellipse cx="480" cy="570" rx="80" ry="120"/>
    <ellipse cx="520" cy="610" rx="70" ry="100"/>
    
    <!-- Right tree -->
    <ellipse cx="1000" cy="540" rx="95" ry="140"/>
    <rect x="987" y="540" width="26" height="190" rx="6"/>
    <ellipse cx="980" cy="585" rx="75" ry="110"/>
    <ellipse cx="1020" cy="620" rx="65" ry="95"/>
  </g>
  
  <!-- Moonlight on tree edges -->
  <g opacity="0.3" stroke="#ffffff" stroke-width="2" fill="none">
    <path d="M 160,540 Q 180,520 200,545"/>
    <path d="M 480,510 Q 500,490 520,515"/>
    <path d="M 980,530 Q 1000,510 1020,535"/>
  </g>
  
  <!-- Surveillance equipment glow (cameras) -->
  <g opacity="0.8">
    <!-- Left sentinel -->
    <circle cx="250" cy="600" r="8" fill="#00ff88"/>
    <circle cx="250" cy="600" r="20" fill="#00ff88" opacity="0.2"/>
    
    <!-- Center sentinel -->
    <circle cx="600" cy="570" r="8" fill="#00ff88"/>
    <circle cx="600" cy="570" r="20" fill="#00ff88" opacity="0.2"/>
    
    <!-- Right sentinel -->
    <circle cx="950" cy="590" r="8" fill="#00ff88"/>
    <circle cx="950" cy="590" r="20" fill="#00ff88" opacity="0.2"/>
  </g>
  
  <!-- Scanner beams -->
  <g opacity="0.15" stroke="#00ff88" stroke-width="1" fill="none">
    <path d="M 250,600 L 450,650"/>
    <path d="M 600,570 L 400,640"/>
    <path d="M 600,570 L 800,630"/>
    <path d="M 950,590 L 750,645"/>
  </g>
  
  <!-- Ground vegetation silhouettes -->
  <g opacity="0.7" fill="#000000">
    <ellipse cx="300" cy="720" rx="130" ry="50"/>
    <ellipse cx="700" cy="740" rx="150" ry="55"/>
    <ellipse cx="1050" cy="730" rx="140" ry="52"/>
  </g>
  
  <!-- Foreground undergrowth -->
  <path d="M 0,750 Q 300,730 600,750 T 1200,750 L 1200,800 L 0,800 Z" fill="#000000" opacity="0.8"/>
</svg>
