<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0826d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dirtPile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b7653;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5c3f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dirtyWater" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6b5333;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hazy sky (pollution) -->
  <rect width="1200" height="800" fill="#b8a696"/>
  
  <!-- Distant damaged forest -->
  <path d="M 0,300 L 150,280 L 200,290 L 280,270 L 350,285 L 500,275 L 650,290 L 800,280 L 950,295 L 1100,285 L 1200,300 L 1200,350 L 0,350 Z" 
        fill="#3d5a4a" opacity="0.5"/>
  
  <!-- Eroded landscape -->
  <path d="M 0,350 Q 300,380 600,360 T 1200,380 L 1200,800 L 0,800 Z" fill="url(#mudGradient)"/>
  
  <!-- Mining pits -->
  <ellipse cx="300" cy="500" rx="180" ry="90" fill="#6b5333" opacity="0.7"/>
  <ellipse cx="850" cy="520" rx="200" ry="100" fill="#6b5333" opacity="0.7"/>
  
  <!-- Muddy water pools -->
  <ellipse cx="300" cy="520" rx="150" ry="70" fill="url(#dirtyWater)"/>
  <ellipse cx="850" cy="545" rx="170" ry="80" fill="url(#dirtyWater)"/>
  
  <!-- Excavated dirt piles -->
  <g>
    <ellipse cx="150" cy="480" rx="100" ry="80" fill="url(#dirtPile)"/>
    <ellipse cx="150" cy="460" rx="80" ry="60" fill="url(#dirtPile)" opacity="0.8"/>
    
    <ellipse cx="650" cy="500" rx="120" ry="90" fill="url(#dirtPile)"/>
    <ellipse cx="650" cy="480" rx="95" ry="70" fill="url(#dirtPile)" opacity="0.8"/>
    
    <ellipse cx="1050" cy="490" rx="110" ry="85" fill="url(#dirtPile)"/>
    <ellipse cx="1050" cy="470" rx="85" ry="65" fill="url(#dirtPile)" opacity="0.8"/>
  </g>
  
  <!-- Dead/cut trees -->
  <g fill="#654321" opacity="0.8">
    <rect x="195" y="420" width="12" height="60" rx="3"/>
    <ellipse cx="201" cy="415" rx="15" ry="8"/>
    
    <rect x="755" y="440" width="14" height="70" rx="3"/>
    <ellipse cx="762" cy="435" rx="17" ry="9"/>
    
    <rect x="495" y="410" width="10" height="50" rx="2"/>
    <ellipse cx="500" cy="405" rx="13" ry="7"/>
    
    <rect x="950" y="430" width="13" height="65" rx="3"/>
    <ellipse cx="956" cy="425" rx="16" ry="8"/>
  </g>
  
  <!-- Mining trucks/equipment -->
  <g>
    <!-- Dump truck -->
    <rect x="450" y="560" width="80" height="40" fill="#ff6b35" rx="3"/>
    <rect x="465" y="570" width="25" height="20" fill="#4a4a4a" opacity="0.6" rx="2"/>
    <rect x="480" y="540" width="45" height="25" fill="#d4460f" rx="2"/>
    <!-- Wheels -->
    <circle cx="470" cy="605" r="12" fill="#333"/>
    <circle cx="470" cy="605" r="8" fill="#555"/>
    <circle cx="510" cy="605" r="12" fill="#333"/>
    <circle cx="510" cy="605" r="8" fill="#555"/>
    
    <!-- Another excavator in distance -->
    <rect x="800" y="470" width="40" height="25" fill="#ffd700" rx="2"/>
    <rect x="835" y="475" width="30" height="8" fill="#daa520" rx="2" transform="rotate(-25 850 479)"/>
  </g>
  
  <!-- Erosion patterns -->
  <g stroke="#654321" stroke-width="3" fill="none" opacity="0.4">
    <path d="M 100,600 Q 200,580 300,600"/>
    <path d="M 400,620 Q 500,600 600,620"/>
    <path d="M 700,610 Q 800,590 900,610"/>
  </g>
  
  <!-- Sediment trails -->
  <g opacity="0.3">
    <ellipse cx="300" cy="650" rx="100" ry="40" fill="#8b6f47"/>
    <ellipse cx="850" cy="670" rx="120" ry="45" fill="#8b6f47"/>
  </g>
  
  <!-- Environmental damage atmosphere -->
  <rect width="1200" height="800" fill="#8b4513" opacity="0.08"/>
</svg>
