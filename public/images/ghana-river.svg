<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9fd8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2171b5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bankGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#654321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3219;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunReflection" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4a9fd8;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="800" fill="#87ceeb"/>
  
  <!-- Distant trees on horizon -->
  <ellipse cx="600" cy="280" rx="800" ry="120" fill="#2d5a3d" opacity="0.6"/>
  
  <!-- River banks -->
  <path d="M 0,350 Q 300,320 600,340 T 1200,330 L 1200,800 L 0,800 Z" fill="url(#bankGradient)"/>
  <path d="M 0,380 Q 300,350 600,370 T 1200,360" fill="none" stroke="#4a3219" stroke-width="2" opacity="0.5"/>
  
  <!-- River water -->
  <path d="M 0,350 Q 300,320 600,340 T 1200,330 L 1200,500 Q 900,520 600,510 T 0,530 Z" fill="url(#waterGradient)"/>
  
  <!-- Water ripples -->
  <g opacity="0.3" fill="none" stroke="#ffffff" stroke-width="1">
    <path d="M 200,380 Q 250,375 300,380"/>
    <path d="M 500,350 Q 550,345 600,350"/>
    <path d="M 800,360 Q 850,355 900,360"/>
    <path d="M 300,420 Q 350,415 400,420"/>
    <path d="M 700,390 Q 750,385 800,390"/>
  </g>
  
  <!-- Sun reflections on water -->
  <ellipse cx="400" cy="410" rx="60" ry="30" fill="url(#sunReflection)"/>
  <ellipse cx="750" cy="390" rx="50" ry="25" fill="url(#sunReflection)"/>
  
  <!-- Riverside vegetation -->
  <g fill="#2d5a3d">
    <!-- Left bank trees -->
    <ellipse cx="150" cy="420" rx="70" ry="100"/>
    <rect x="140" y="420" width="20" height="120" rx="5"/>
    
    <ellipse cx="250" cy="400" rx="60" ry="90"/>
    <rect x="242" y="400" width="16" height="100" rx="4"/>
    
    <!-- Right bank trees -->
    <ellipse cx="950" cy="410" rx="65" ry="95"/>
    <rect x="941" y="410" width="18" height="110" rx="4"/>
    
    <ellipse cx="1050" cy="390" rx="70" ry="100"/>
    <rect x="1040" y="390" width="20" height="120" rx="5"/>
  </g>
  
  <!-- Palm trees -->
  <g>
    <!-- Left palm -->
    <rect x="90" y="380" width="12" height="150" fill="#8b6f47" rx="3"/>
    <g fill="#27ae60">
      <ellipse cx="96" cy="370" rx="50" ry="15" transform="rotate(-45 96 370)"/>
      <ellipse cx="96" cy="370" rx="50" ry="15" transform="rotate(-20 96 370)"/>
      <ellipse cx="96" cy="370" rx="50" ry="15" transform="rotate(10 96 370)"/>
      <ellipse cx="96" cy="370" rx="50" ry="15" transform="rotate(35 96 370)"/>
    </g>
    
    <!-- Right palm -->
    <rect x="1094" y="360" width="12" height="160" fill="#8b6f47" rx="3"/>
    <g fill="#27ae60">
      <ellipse cx="1100" cy="350" rx="50" ry="15" transform="rotate(-40 1100 350)"/>
      <ellipse cx="1100" cy="350" rx="50" ry="15" transform="rotate(-15 1100 350)"/>
      <ellipse cx="1100" cy="350" rx="50" ry="15" transform="rotate(15 1100 350)"/>
      <ellipse cx="1100" cy="350" rx="50" ry="15" transform="rotate(40 1100 350)"/>
    </g>
  </g>
  
  <!-- Riverside grass -->
  <g opacity="0.7">
    <rect x="0" y="520" width="1200" height="50" fill="#4a7c59"/>
    <path d="M 0,550 Q 300,530 600,550 T 1200,550 L 1200,570 L 0,570 Z" fill="#3d6b4d"/>
  </g>
  
  <!-- Foreground bushes -->
  <ellipse cx="200" cy="620" rx="120" ry="80" fill="#2d5a3d" opacity="0.8"/>
  <ellipse cx="500" cy="650" rx="140" ry="90" fill="#2d5a3d" opacity="0.8"/>
  <ellipse cx="900" cy="630" rx="130" ry="85" fill="#2d5a3d" opacity="0.8"/>
  
  <!-- Muddy bank -->
  <path d="M 0,700 Q 300,680 600,700 T 1200,700 L 1200,800 L 0,800 Z" fill="#654321" opacity="0.6"/>
</svg>
